release-repository:
  name: Release to GitHub Pages
  runs-on: ubuntu-latest
  needs: generate-repository
  if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
  
  steps:
    - name: Checkout gh-pages
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages
        # This will fail if branch doesn't exist, so we handle it
        fail-if-not-exists: false
    
    - name: Create gh-pages branch if it doesn't exist
      if: steps.checkout.outputs.exit-code != 0
      run: |
        git checkout --orphan gh-pages
        git rm -rf .
        git commit --allow-empty -m "Initial gh-pages branch"
        git push origin gh-pages
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: repository-files
        path: ./repository
    
    - name: Download addon
      uses: actions/download-artifact@v4
      with:
        name: tubi-tv-addon
        path: ./repository/addons
    
    - name: Deploy to GitHub Pages
      run: |
        # Copy files to gh-pages directory
        cp ./repository/addons.xml ./gh-pages/
        cp ./repository/addons.xml.md5 ./gh-pages/
        
        # Copy addon zip
        mkdir -p ./gh-pages/addons
        cp ./repository/addons/*.zip ./gh-pages/addons/
        
        # Configure git
        cd ./gh-pages
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        # Add and commit changes
        git add .
        git commit -m "Update repository: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages
        
        echo "Deployed to GitHub Pages"
