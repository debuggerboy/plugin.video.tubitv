name: Build Kodi Add-on

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Add-on
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pycodestyle pylint xmlschema
      
      - name: Validate addon.xml
        run: |
          xmllint --noout --schema https://raw.githubusercontent.com/xbmc/xbmc/master/xbmc/addons/Addon.xsd addon.xml || true
      
      - name: Python syntax check
        run: |
          find . -name "*.py" -not -path "./.github/*" -exec python -m py_compile {} \;
      
      - name: PEP8 style check
        run: |
          pycodestyle --max-line-length=120 --ignore=E501,W503,W293,E302,E128,W291 resources/
      
      - name: Check required files
        run: |
          test -f addon.xml || exit 1
          test -f main.py || exit 1
          test -f resources/lib/tubi_api.py || exit 1
          test -f resources/lib/utils.py || exit 1
          test -f resources/lib/player.py || exit 1
          test -f icon.png || exit 1
          test -f fanart.jpg || exit 1

  build:
    name: Build Add-on
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep -oP 'version="\K[0-9.]+' addon.xml | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_TYPE=release" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            echo "RELEASE_TYPE=stable" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            echo "RELEASE_TYPE=beta" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_TYPE=dev" >> $GITHUB_OUTPUT
          fi
      
      - name: Create add-on archive
        run: |
          ADDON_ID=$(grep -oP 'id="\K[^"]+' addon.xml | head -1)
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          if [[ "${{ steps.get_version.outputs.RELEASE_TYPE }}" == "release" ]]; then
            ARCHIVE_NAME="${ADDON_ID}-${VERSION}.zip"
          else
            ARCHIVE_NAME="${ADDON_ID}-${VERSION}-${{ steps.get_version.outputs.SHORT_SHA }}.zip"
          fi
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV
          zip -r "$ARCHIVE_NAME" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x "*.swp" \
            -x "*.swo" \
            -x ".DS_Store" \
            -x "Thumbs.db" \
            -x "*.log" \
            -x "*.tmp"
          echo "Created archive: $ARCHIVE_NAME"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tubi-tv-addon
          path: |
            ${{ env.ARCHIVE_NAME }}
          retention-days: 30
      
      - name: Upload to release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ env.ARCHIVE_NAME }}
          asset_name: ${{ env.ARCHIVE_NAME }}
          asset_content_type: application/zip

  generate-repository:
    name: Generate Repository XML
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: tubi-tv-addon
          path: ./addon
      
      - name: Generate repository XML
        run: |
          ADDON_ID=$(grep -oP 'id="\K[^"]+' addon.xml | head -1)
          VERSION=$(grep -oP 'version="\K[0-9.]+' addon.xml | head -1)
          ARCHIVE_NAME="${ADDON_ID}-${VERSION}.zip"
          ZIP_FILE=$(find ./addon -name "*.zip" | head -1)
          if [[ -f "$ZIP_FILE" ]]; then
            MD5=$(md5sum "$ZIP_FILE" | cut -d' ' -f1)
          else
            echo "Error: ZIP file not found"
            exit 1
          fi
          SIZE=$(stat -c%s "$ZIP_FILE")
          cat > addons.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <addons>
            <addon id="${ADDON_ID}" version="${VERSION}">
              <import addon="xbmc.python" version="3.0.0"/>
              <import addon="script.module.requests" version="2.25.0"/>
              <import addon="script.module.inputstreamhelper" version="0.5.0"/>
              <import addon="inputstream.adaptive" version="2.6.24"/>
              <extension point="xbmc.python.pluginsource" library="main.py">
                <provides>video</provides>
              </extension>
              <extension point="xbmc.addon.metadata">
                <summary lang="en_GB">Watch free movies and TV shows from Tubi TV</summary>
                <description lang="en_GB">Tubi TV is an ad-supported streaming service offering a large library of movies and TV shows completely free. This add-on brings the Tubi TV experience directly to Kodi.</description>
                <platform>all</platform>
                <license>GNU General Public License v3.0</license>
                <forum>https://forum.kodi.tv/showthread.php?tid=123456</forum>
                <website>https://tubitv.com</website>
                <source>https://github.com/${{ github.repository }}</source>
                <email>debuggerboy@gmail.com</email>
                <news>Version ${VERSION} released</news>
                <assets>
                  <icon>icon.png</icon>
                  <fanart>fanart.jpg</fanart>
                </assets>
              </extension>
            </addon>
          </addons>
          EOF
          md5sum addons.xml | cut -d' ' -f1 > addons.xml.md5
          echo "Generated repository files"
      
      - name: Upload repository files
        uses: actions/upload-artifact@v4
        with:
          name: repository-files
          path: |
            addons.xml
            addons.xml.md5

  release-repository:
    name: Release to GitHub Pages
    runs-on: ubuntu-latest
    needs: generate-repository
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: repository-files
          path: ./repository
      
      - name: Download addon
        uses: actions/download-artifact@v4
        with:
          name: tubi-tv-addon
          path: ./repository/addons
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repository
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
          commit_message: "Release from ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

  test-install:
    name: Test Installation
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: tubi-tv-addon
          path: ./addon
      
      - name: Test zip integrity
        run: |
          ZIP_FILE=$(find ./addon -name "*.zip" | head -1)
          if unzip -t "$ZIP_FILE"; then
            echo "✅ ZIP file is valid"
          else
            echo "❌ ZIP file is corrupted"
            exit 1
          fi
          mkdir ./extracted
          unzip "$ZIP_FILE" -d ./extracted
          cd ./extracted
          test -f addon.xml || exit 1
          test -f main.py || exit 1
          test -f resources/lib/tubi_api.py || exit 1
          test -d resources/language/resource.language.en_gb || exit 1
          echo "✅ Add-on structure is valid"
